<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f26638">
<title>المعلم — Maalem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;900&family=Jost:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* ── Palette (from the design brief) ─────────────────────── */
    --orange:#f26638;
    --orange-hover:#da5c32;
    --orange-active:#c2522d;
    --orange-deep:#552414;
    --orange-tint:#fef0eb;
    --orange-tint2:#fde8e1;
    --orange-tint3:#fbd0c1;
    --green:#00a991;
    --green-hover:#009883;
    --green-deep:#003b33;
    --green-tint:#e6f6f4;
    --green-tint2:#d9f2ef;
    --tan:#faa864;
    --cream:#fff6f0;
    --ink:#3a2014;
    --muted:#9a7d6e;
    --card:#ffffff;
    --line:#f1e2d8;
    --radius:22px;
    --shadow:0 18px 50px -22px rgba(85,36,20,.45);
    --shadow-sm:0 8px 24px -12px rgba(85,36,20,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    font-family:'Cairo',system-ui,sans-serif;
    color:var(--ink);
    background:var(--cream);
    overflow:hidden;
  }
  /* Zellige motif — the Moroccan signature, kept very quiet */
  .zellige{
    position:fixed;inset:0;z-index:0;pointer-events:none;
    opacity:.05;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120' viewBox='0 0 120 120'><g fill='none' stroke='%23552414' stroke-width='2'><path d='M60 4 74 46 116 60 74 74 60 116 46 74 4 60 46 46Z'/><circle cx='60' cy='60' r='20'/><rect x='46' y='46' width='28' height='28' transform='rotate(45 60 60)'/></g></svg>");
    background-size:150px 150px;
  }

  #app{
    position:relative;z-index:1;
    height:100dvh;width:100%;max-width:460px;margin:0 auto;
    display:flex;flex-direction:column;overflow:hidden;
  }

  /* ── Screens ─────────────────────────────────────────────── */
  .screen{
    position:absolute;inset:0;display:flex;flex-direction:column;
    padding:max(28px,env(safe-area-inset-top)) 24px 28px;
    opacity:0;transform:translateY(14px);pointer-events:none;
    transition:opacity .45s ease,transform .45s ease;
  }
  .screen.active{opacity:1;transform:none;pointer-events:auto}

  /* ── Wordmark ────────────────────────────────────────────── */
  .mark{display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1}
  .mark .ar{font-weight:900;letter-spacing:.02em}
  .mark .lat{font-family:'Jost',sans-serif;font-weight:600;letter-spacing:.42em;
    text-transform:uppercase;color:var(--orange);padding-inline-start:.42em}

  /* ── Welcome ─────────────────────────────────────────────── */
  #welcome{justify-content:center;align-items:center;text-align:center;gap:0}
  .badge{
    width:128px;height:128px;border-radius:36px;display:grid;place-items:center;
    background:linear-gradient(150deg,var(--orange),var(--tan));
    box-shadow:var(--shadow);margin-bottom:30px;position:relative;
    animation:floaty 5s ease-in-out infinite;
  }
  @keyframes floaty{50%{transform:translateY(-9px)}}
  .badge .ar{color:#fff;font-size:54px;font-weight:900}
  #welcome .mark .ar{font-size:40px;color:var(--orange-deep)}
  #welcome .mark .lat{font-size:13px;margin-top:4px}
  .tagline{margin:18px 0 0;font-size:18px;font-weight:600;color:var(--orange-deep);max-width:18ch}
  .sub{margin:10px 0 0;color:var(--muted);font-size:15px;max-width:24ch;line-height:1.7}

  /* ── Buttons ─────────────────────────────────────────────── */
  .btn{
    appearance:none;border:0;cursor:pointer;font-family:inherit;font-weight:700;
    font-size:18px;border-radius:18px;padding:16px 26px;width:100%;
    background:var(--orange);color:#fff;box-shadow:var(--shadow-sm);
    transition:background .15s,transform .1s;
  }
  .btn:hover{background:var(--orange-hover)}
  .btn:active{background:var(--orange-active);transform:translateY(1px)}
  .btn:disabled{background:var(--orange-tint3);color:#fff;cursor:default;box-shadow:none}
  .btn.ghost{background:transparent;color:var(--muted);box-shadow:none;font-weight:600;font-size:15px}
  .btn.ghost:hover{color:var(--orange-deep)}
  .stack{margin-top:auto;display:flex;flex-direction:column;gap:6px;width:100%}

  /* ── Onboarding ──────────────────────────────────────────── */
  .top{display:flex;align-items:center;justify-content:space-between;margin-bottom:34px}
  .dots{display:flex;gap:7px}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--orange-tint3);transition:.3s}
  .dot.on{background:var(--orange);width:26px;border-radius:5px}
  .q{font-size:27px;font-weight:800;color:var(--orange-deep);line-height:1.4;margin:0 0 8px}
  .q-sub{color:var(--muted);font-size:15px;margin:0 0 26px}
  .field{
    width:100%;font-family:inherit;font-size:19px;color:var(--ink);
    background:var(--card);border:2px solid var(--line);border-radius:18px;
    padding:17px 20px;outline:none;transition:border-color .15s,box-shadow .15s;
  }
  .field::placeholder{color:#c9b3a6}
  .field:focus{border-color:var(--orange);box-shadow:0 0 0 4px var(--orange-tint)}

  /* ── Craft grid ──────────────────────────────────────────── */
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;overflow-y:auto;padding:2px;margin:0 -2px}
  .craft{
    background:var(--card);border:2px solid var(--line);border-radius:18px;
    padding:18px 10px;display:flex;flex-direction:column;align-items:center;gap:9px;
    cursor:pointer;transition:.15s;font-weight:600;font-size:15px;color:var(--orange-deep);
  }
  .craft .ic{font-size:30px;line-height:1}
  .craft:hover{border-color:var(--orange-tint3);transform:translateY(-2px)}
  .craft.sel{border-color:var(--orange);background:var(--orange-tint);box-shadow:var(--shadow-sm)}

  /* ── Chat ────────────────────────────────────────────────── */
  #chat{padding:0}
  .chat-head{
    display:flex;align-items:center;gap:12px;padding:16px 20px;
    padding-top:max(16px,env(safe-area-inset-top));
    background:var(--card);border-bottom:1px solid var(--line);z-index:2;
  }
  .chat-head .av{width:42px;height:42px;border-radius:13px;display:grid;place-items:center;
    background:linear-gradient(150deg,var(--orange),var(--tan));color:#fff;font-weight:900;font-size:20px}
  .chat-head .mark{align-items:flex-start}
  .chat-head .mark .ar{font-size:20px;color:var(--orange-deep)}
  .chat-head .mark .lat{font-size:9px;margin-top:1px}
  .chat-head .status{margin-inline-start:auto;font-size:12px;color:var(--green);font-weight:700;
    display:flex;align-items:center;gap:6px}
  .chat-head .status::before{content:"";width:8px;height:8px;border-radius:50%;background:var(--green)}

  .stream{flex:1;overflow-y:auto;padding:20px 18px 8px;display:flex;flex-direction:column;gap:12px}
  .msg{max-width:82%;padding:13px 17px;border-radius:20px;font-size:16px;line-height:1.6;
    animation:pop .25s ease;white-space:pre-wrap;word-break:break-word}
  @keyframes pop{from{opacity:0;transform:translateY(8px)}}
  .msg.bot{background:var(--green-tint);color:var(--green-deep);align-self:flex-start;border-bottom-right-radius:6px}
  .msg.me{background:var(--orange);color:#fff;align-self:flex-end;border-bottom-left-radius:6px}
  .msg.bot.speaking{box-shadow:0 0 0 3px var(--green-tint2)}
  .typing{display:flex;gap:5px;padding:16px 18px}
  .typing span{width:8px;height:8px;border-radius:50%;background:var(--green);opacity:.4;animation:blink 1.2s infinite}
  .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
  @keyframes blink{50%{opacity:1;transform:translateY(-3px)}}

  .chips{display:flex;gap:8px;padding:4px 18px 10px;flex-wrap:wrap}
  .chip{background:var(--orange-tint);color:var(--orange-deep);border:1px solid var(--orange-tint2);
    border-radius:999px;padding:8px 15px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s}
  .chip:hover{background:var(--orange-tint2)}

  .bar{display:flex;align-items:center;gap:10px;padding:12px 16px;
    padding-bottom:max(12px,env(safe-area-inset-bottom));
    background:var(--card);border-top:1px solid var(--line)}
  .bar input{flex:1;font-family:inherit;font-size:16px;color:var(--ink);background:var(--cream);
    border:2px solid var(--line);border-radius:16px;padding:13px 17px;outline:none;transition:border-color .15s}
  .bar input:focus{border-color:var(--orange)}
  .icon-btn{flex:none;width:50px;height:50px;border-radius:16px;border:0;cursor:pointer;
    display:grid;place-items:center;color:#fff;background:var(--orange);transition:.15s}
  .icon-btn:hover{background:var(--orange-hover)}
  .icon-btn:disabled{opacity:.4;cursor:default}
  .icon-btn svg{width:22px;height:22px;fill:currentColor}

  /* Mic — the signature voice control */
  .mic{position:relative;background:var(--green)}
  .mic:hover{background:var(--green-hover)}
  .mic.live{background:var(--orange)}
  .mic.live::after,.mic.live::before{content:"";position:absolute;inset:0;border-radius:16px;
    border:2px solid var(--orange);animation:ring 1.4s ease-out infinite}
  .mic.live::before{animation-delay:.5s}
  @keyframes ring{from{opacity:.6;transform:scale(1)}to{opacity:0;transform:scale(1.7)}}
  .mic.busy{background:var(--tan)}
  .mic.busy svg{display:none}
  .mic.busy::before{content:"";position:absolute;width:20px;height:20px;border-radius:50%;
    border:3px solid rgba(255,255,255,.4);border-top-color:#fff;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .err{font-size:13px;color:var(--orange-active);text-align:center;padding:0 18px 6px}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>
</head>
<body>
<div class="zellige"></div>
<div id="app">

  <!-- ░░ WELCOME ░░ -->
  <section class="screen active" id="welcome">
    <div class="badge"><span class="ar">م</span></div>
    <div class="mark"><span class="ar">المعلم</span><span class="lat">Maalem</span></div>
    <p class="tagline">مرحبا بيك في المعلم</p>
    <p class="sub">رفيقك الصوتي للصنعة المغربية — كنعاونك تلقا الفيران، تبيع، وتطور خدمتك.</p>
    <div class="stack">
      <button class="btn" onclick="go('ob')">يلا نبداو</button>
    </div>
  </section>

  <!-- ░░ ONBOARDING ░░ -->
  <section class="screen" id="ob">
    <div class="top">
      <div class="dots"><i class="dot on"></i><i class="dot"></i><i class="dot"></i></div>
      <button class="btn ghost" style="width:auto;padding:6px 4px" onclick="startChat()">تخطّى</button>
    </div>

    <div id="step-name">
      <h2 class="q">بغيت نعرف شنو سميتك؟</h2>
      <p class="q-sub">باش نهضر معاك بصفة شخصية.</p>
      <input class="field" id="in-name" placeholder="كتب سميتك هنا" autocomplete="off">
    </div>

    <div id="step-city" hidden>
      <h2 class="q">فين كاتخدم؟</h2>
      <p class="q-sub">باش نلقا ليك الفيران والأسواق القريبة منك.</p>
      <input class="field" id="in-city" placeholder="مثلا: فاس، مراكش، الدار البيضاء…" autocomplete="off">
    </div>

    <div id="step-craft" hidden>
      <h2 class="q">أشنو هي الصنعة ديالك؟</h2>
      <p class="q-sub">ختار اللي كتمارس.</p>
      <div class="grid" id="craft-grid"></div>
    </div>

    <div class="stack">
      <button class="btn" id="ob-next" onclick="obNext()">التالي →</button>
    </div>
  </section>

  <!-- ░░ CHAT ░░ -->
  <section class="screen" id="chat">
    <div class="chat-head">
      <div class="av">م</div>
      <div class="mark"><span class="ar">المعلم</span><span class="lat">Maalem</span></div>
      <span class="status">مْتّصل</span>
    </div>
    <div class="stream" id="stream"></div>
    <div class="chips" id="chips">
      <button class="chip" onclick="quick('وريني شي فيران قريبة مني')">الفيران</button>
      <button class="chip" onclick="quick('كيفاش نبيع الخدمة ديالي ف السوق؟')">السوق</button>
      <button class="chip" onclick="quick('بغيت نصدّر الصنعة ديالي للخارج')">التصدير</button>
    </div>
    <div class="err" id="err"></div>
    <div class="bar">
      <button class="icon-btn mic" id="mic" title="اضغط وتكلم" onclick="toggleMic()" aria-label="اضغط وتكلم">
        <svg viewBox="0 0 24 24"><path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3zm5-3a5 5 0 01-10 0H5a7 7 0 006 6.92V21h2v-3.08A7 7 0 0019 11h-2z"/></svg>
      </button>
      <input id="in-chat" placeholder="تكلم دابا… Pose ta question en Darija" autocomplete="off">
      <button class="icon-btn" id="send" onclick="send()" aria-label="صيفط">
        <svg viewBox="0 0 24 24"><path d="M3 20.5v-6l9-2.5-9-2.5v-6l19 8.5z"/></svg>
      </button>
    </div>
  </section>

</div>

<script>
/* ── State ──────────────────────────────────────────────────── */
const profile = load('maalem_profile', {name:'', city:'', craft:''});
let convo = [];                 // {role:'me'|'bot', text}
let obStep = 0;
const steps = ['name','city','craft'];

const CRAFTS = [
  ['الزليج','◆'],['الجلد','👜'],['النسيج','🧵'],['الخشب','🪵'],
  ['المجوهرات','💍'],['الخزف','🏺'],['التطريز','🪡'],['أخرى','✦']
];

/* ── Storage helpers (safe — degrade in sandboxed previews) ──── */
function load(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d}catch(e){return d}}
function save(k,v){try{localStorage.setItem(k,JSON.stringify(v))}catch(e){}}

/* ── Screen routing ─────────────────────────────────────────── */
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ── Onboarding ─────────────────────────────────────────────── */
const grid=document.getElementById('craft-grid');
CRAFTS.forEach(([name,ic])=>{
  const b=document.createElement('button');
  b.className='craft';b.innerHTML=`<span class="ic">${ic}</span>${name}`;
  b.onclick=()=>{document.querySelectorAll('.craft').forEach(c=>c.classList.remove('sel'));
    b.classList.add('sel');profile.craft=name;};
  if(profile.craft===name)b.classList.add('sel');
  grid.appendChild(b);
});
document.getElementById('in-name').value=profile.name;
document.getElementById('in-city').value=profile.city;

function setStep(i){
  obStep=i;
  steps.forEach((s,idx)=>document.getElementById('step-'+s).hidden=(idx!==i));
  document.querySelectorAll('#ob .dot').forEach((d,idx)=>d.classList.toggle('on',idx<=i));
  document.getElementById('ob-next').textContent = i===steps.length-1 ? 'يلا نبداو الهضرة' : 'التالي →';
}
function obNext(){
  if(obStep===0)profile.name=document.getElementById('in-name').value.trim();
  if(obStep===1)profile.city=document.getElementById('in-city').value.trim();
  save('maalem_profile',profile);
  if(obStep<steps.length-1){setStep(obStep+1);
    const f=document.querySelector('#step-'+steps[obStep]+' .field');if(f)f.focus();}
  else startChat();
}

/* ── Chat boot ──────────────────────────────────────────────── */
function startChat(){
  save('maalem_profile',profile);
  go('chat');
  if(convo.length===0){
    const name=profile.name||'صاحبي';
    const city=profile.city;
    const greet = city
      ? `مرحبا ${name}! 👋 واش بغيتي تشوف شي فيران قريبة من ${city}؟`
      : `مرحبا ${name}! 👋 ديما أنا هنا — سولني على الفيران، السوق، ولا التصدير.`;
    addMsg('bot',greet);
  }
  setTimeout(()=>document.getElementById('in-chat').focus(),300);
}

/* ── Messages ───────────────────────────────────────────────── */
const stream=document.getElementById('stream');
function addMsg(role,text){
  convo.push({role,text});
  const el=document.createElement('div');
  el.className='msg '+role;el.textContent=text;
  stream.appendChild(el);stream.scrollTop=stream.scrollHeight;
  return el;
}
function showTyping(){
  const t=document.createElement('div');t.className='msg bot typing';t.id='typing';
  t.innerHTML='<span></span><span></span><span></span>';
  stream.appendChild(t);stream.scrollTop=stream.scrollHeight;
}
function hideTyping(){const t=document.getElementById('typing');if(t)t.remove();}

function quick(t){document.getElementById('in-chat').value=t;send();}

/* ── Send to backend ────────────────────────────────────────── */
async function send(){
  const input=document.getElementById('in-chat');
  const text=input.value.trim();if(!text)return;
  document.getElementById('err').textContent='';
  input.value='';addMsg('me',text);
  document.getElementById('send').disabled=true;
  showTyping();

  // Hidden context turn so Gemini knows who it's talking to (not rendered)
  const ctx={role:'user',text:`(سياق المستخدم — ما تعاودوش: السمية ${profile.name||'؟'}، المدينة ${profile.city||'؟'}، الصنعة ${profile.craft||'؟'}. جاوب بالدارجة المغربية بالحروف العربية.)`};
  const payload=[ctx,...convo].map(m=>({role:m.role==='me'?'user':'bot',text:m.text}));

  try{
    const res=await fetch('/api/chat',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages:payload,lang:'ar'})
    });
    hideTyping();
    if(!res.ok){throw new Error('server');}
    const data=await res.json();
    if(data.error)throw new Error(data.error);
    const reply=data.audioText||data.text||'…';
    const el=addVoiceMsg('bot',reply);
    playReply(reply,el);
  }catch(e){
    hideTyping();
    document.getElementById('err').textContent='ما قدرناش نوصلو للخادم. تأكد بلي الموقع متّصل بالإنترنت وأن مفتاح Gemini مضبوط.';
  }finally{
    document.getElementById('send').disabled=false;
    input.focus();
  }
}
document.getElementById('in-chat').addEventListener('keydown',e=>{if(e.key==='Enter')send()});

/* ── Voice OUT (audio-only replies) ─────────────────────────────
   The bot answers with a voice bubble (no visible text). We try server-side
   Gemini TTS first (works on every device); if that is not available we fall
   back to the browser voice. The text is kept on the element so it can be
   replayed and so the conversation context stays intact. */
let currentAudio=null;
function addVoiceMsg(role,text){
  convo.push({role,text});
  const el=document.createElement('div');
  el.className='msg '+role+' voice';
  el.dataset.text=text;
  el.innerHTML='<button class="vplay" type="button" aria-label="استمع للرد">▶︎</button>'
    +'<span class="vlabel">🔊 رسالة صوتية</span>';
  // light inline styling so it looks like a voice note
  el.style.display='flex';el.style.alignItems='center';el.style.gap='10px';
  const btn=el.querySelector('.vplay');
  btn.style.cssText='border:0;cursor:pointer;width:34px;height:34px;border-radius:50%;'
    +'background:var(--green,#1aa87a);color:#fff;font-size:14px;flex:0 0 auto;';
  el.querySelector('.vlabel').style.cssText='font-size:13px;opacity:.85;';
  btn.addEventListener('click',()=>playReply(text,el));
  stream.appendChild(el);stream.scrollTop=stream.scrollHeight;
  return el;
}

async function playReply(text,el){
  if(!text)return;
  try{if(currentAudio){currentAudio.pause();currentAudio=null;}}catch(e){}
  try{speechSynthesis.cancel();}catch(e){}
  if(el)el.classList.add('speaking');
  const done=()=>{if(el)el.classList.remove('speaking');};
  try{
    const res=await fetch('/api/tts',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({text})
    });
    if(!res.ok)throw new Error('tts');
    const data=await res.json();
    if(!data.audio)throw new Error('noaudio');
    const url=URL.createObjectURL(pcmToWav(data.audio,data.rate||24000));
    const audio=new Audio(url);currentAudio=audio;
    audio.onended=()=>{done();URL.revokeObjectURL(url);};
    await audio.play();
  }catch(e){
    speakFallback(text,el,done); // browser voice if server TTS unavailable
  }
}

// Browser voice fallback (needs an Arabic voice installed on the device).
function speakFallback(text,el,done){
  if(!('speechSynthesis'in window)){if(done)done();return;}
  try{
    speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='ar-SA';u.rate=.95;
    const ar=speechSynthesis.getVoices().find(v=>v.lang.startsWith('ar'));
    if(ar)u.voice=ar;
    u.onend=()=>{if(done)done();};
    speechSynthesis.speak(u);
  }catch(e){if(done)done();}
}

// Wrap raw 16-bit mono PCM (base64) from Gemini into a playable WAV blob.
function pcmToWav(b64,rate){
  const bin=atob(b64),len=bin.length;
  const buf=new ArrayBuffer(44+len),view=new DataView(buf);
  const wr=(o,s)=>{for(let i=0;i<s.length;i++)view.setUint8(o+i,s.charCodeAt(i));};
  wr(0,'RIFF');view.setUint32(4,36+len,true);wr(8,'WAVE');wr(12,'fmt ');
  view.setUint32(16,16,true);view.setUint16(20,1,true);view.setUint16(22,1,true);
  view.setUint32(24,rate,true);view.setUint32(28,rate*2,true);
  view.setUint16(32,2,true);view.setUint16(34,16,true);wr(36,'data');
  view.setUint32(40,len,true);
  for(let i=0;i<len;i++)view.setUint8(44+i,bin.charCodeAt(i));
  return new Blob([buf],{type:'audio/wav'});
}
if('speechSynthesis'in window)speechSynthesis.onvoiceschanged=()=>{};

/* ── Voice IN (record → Gemini transcribes the Darija) ──────────
   The browser's own speech recognition has no real Darija support, so we
   record the audio and let Gemini transcribe it on the server instead. */
const micBtn=document.getElementById('mic');
let media=null,chunks=[],recording=false,micStream=null,stopTimer=null;

function showErr(m){document.getElementById('err').textContent=m||'';}

function pickMime(){
  const opts=['audio/webm;codecs=opus','audio/ogg;codecs=opus','audio/webm','audio/mp4'];
  for(const m of opts){try{if(window.MediaRecorder&&MediaRecorder.isTypeSupported(m))return m;}catch(e){}}
  return '';
}

async function toggleMic(){
  if(recording){stopRec();return;}
  if(!navigator.mediaDevices||!window.MediaRecorder){showErr('المتصفح ديالك ما كيدعمش التسجيل الصوتي. جرّب Chrome.');return;}
  showErr('');
  try{micStream=await navigator.mediaDevices.getUserMedia({audio:true});}
  catch(e){showErr('خاصك تسمح بالميكروفون باش نقدر نسمع ليك.');return;}
  try{speechSynthesis.cancel();}catch(e){}
  const mime=pickMime();chunks=[];
  media=new MediaRecorder(micStream,mime?{mimeType:mime}:undefined);
  media.ondataavailable=e=>{if(e.data&&e.data.size)chunks.push(e.data);};
  media.onstop=handleStop;
  media.start();
  recording=true;micBtn.classList.add('live');micBtn.title='سالي التسجيل';
  stopTimer=setTimeout(()=>{if(recording)stopRec();},15000); // safety cap
}

function stopRec(){
  recording=false;clearTimeout(stopTimer);
  micBtn.classList.remove('live');micBtn.title='اضغط وتكلم';
  try{if(media&&media.state!=='inactive')media.stop();}catch(e){}
  if(micStream){micStream.getTracks().forEach(t=>t.stop());micStream=null;}
}

async function handleStop(){
  if(!chunks.length){return;}
  const type=(media&&media.mimeType)||'audio/webm';
  const blob=new Blob(chunks,{type});
  const mimeType=type.split(';')[0];
  micBtn.classList.add('busy');micBtn.disabled=true;
  const input=document.getElementById('in-chat');
  const ph=input.placeholder;input.placeholder='كنحوّل الصوت لكلام…';
  try{
    const b64=await blobToBase64(blob);
    const r=await fetch('/api/transcribe',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({audio:b64,mimeType})});
    const data=await r.json();
    if(!r.ok||data.error)throw new Error(data.error||'fail');
    const t=(data.text||'').trim();
    if(t){input.value=t;send();}
    else{showErr('ما سمعتش مزيان، عاود تكلم من فضلك.');}
  }catch(e){
    showErr('ما قدرناش نحوّلو الصوت. تأكد من الإنترنت ومن مفتاح Gemini.');
  }finally{
    micBtn.classList.remove('busy');micBtn.disabled=false;input.placeholder=ph;
  }
}

function blobToBase64(blob){
  return new Promise((res,rej)=>{const r=new FileReader();
    r.onloadend=()=>res(String(r.result).split(',')[1]);r.onerror=rej;r.readAsDataURL(blob);});
}

/* init */
setStep(0);
</script>
